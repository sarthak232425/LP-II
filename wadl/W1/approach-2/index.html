<!--
W1: Develop a responsive product catalog webpage using HTML, CSS, and JavaScript. The webpage should display products in a table format with images and implement pagination if there are more than 10 products.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Catalog - Approach 2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Our Products</h1>
    <div id="product-table">
        <table>
            <thead>
                <tr>
                    <th>Image</th>
                    <th>Product Name</th>
                    <th>Price (INR)</th>
                    <th>Description</th>
                </tr>
            </thead>
            <tbody id="product-body">
                <!-- Products will be injected here by JavaScript -->
            </tbody>
        </table>
    </div>
    <div id="pagination-controls" class="pagination">
        <!-- Pagination buttons will be injected here -->
    </div>

    <script src="script.js"></script>

</body>
</html>
