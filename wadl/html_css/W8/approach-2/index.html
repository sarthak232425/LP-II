<!--
W8: Create an event registration form using Bootstrap's form components. Include input validation, floating labels, and tooltips to guide the user.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h2 class="text-center mb-4">Event Registration Form</h2>
                <form class="needs-validation" novalidate>
                    <!-- Full Name with Floating Label -->
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="fullName" placeholder="John Doe" required>
                        <label for="fullName">Full Name</label>
                        <div class="invalid-feedback">
                            Please enter your full name.
                        </div>
                    </div>

                    <!-- Email with Floating Label and Tooltip -->
                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="email" placeholder="name@example.com" required
                               data-bs-toggle="tooltip" data-bs-placement="top"
                               title="We'll never share your email with anyone else.">
                        <label for="email">Email address</label>
                        <div class="invalid-feedback">
                            Please provide a valid email.
                        </div>
                    </div>

                    <!-- Phone Number with Floating Label -->
                    <div class="form-floating mb-3">
                        <input type="tel" class="form-control" id="phone" placeholder="123-456-7890" required pattern="[0-9]{10}">
                        <label for="phone">Phone Number</label>
                        <div class="invalid-feedback">
                            Please enter a 10-digit phone number.
                        </div>
                    </div>

                    <!-- Event Selection -->
                    <div class="mb-3">
                        <label for="eventSelect" class="form-label">Which event are you registering for?</label>
                        <select class="form-select" id="eventSelect" required>
                            <option selected disabled value="">Choose...</option>
                            <option>Tech Conference 2026</option>
                            <option>Marketing Summit 2026</option>
                            <option>Design Workshop 2026</option>
                        </select>
                        <div class="invalid-feedback">
                            Please select an event.
                        </div>
                    </div>

                    <!-- Terms and Conditions Checkbox -->
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" value="" id="termsCheck" required>
                        <label class="form-check-label" for="termsCheck">
                            I agree to the terms and conditions
                        </label>
                        <div class="invalid-feedback">
                            You must agree before submitting.
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <div class="d-grid">
                        <button class="btn btn-primary" type="submit">Register</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
