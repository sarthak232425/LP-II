<!--
W7: Create the following web page of Facebook using Bootstrap. (Note: Refers to the login/signup interface with fields for Firstname, Lastname, Email, Password, Birthday, and Gender).
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Clone</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f2f5;
        }
        .main-content {
            padding-top: 8vh;
        }
        .form-container {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 4px rgba(0, 0, 0, .1), 0 8px 16px rgba(0, 0, 0, .1);
        }
    </style>
</head>
<body>

    <div class="container main-content">
        <div class="row align-items-center">
            <!-- Left Side: Brand Info -->
            <div class="col-lg-6 text-center text-lg-start mb-5 mb-lg-0">
                <h1 class="text-primary fw-bold" style="font-size: 58px;">facebook</h1>
                <p class="fs-4">Facebook helps you connect and share with the people in your life.</p>
            </div>

            <!-- Right Side: Form -->
            <div class="col-lg-6">
                <div class="form-container">
                    <!-- Login Form -->
                    <form>
                        <div class="mb-3">
                            <input type="email" class="form-control form-control-lg" placeholder="Email address or phone number">
                        </div>
                        <div class="mb-3">
                            <input type="password" class="form-control form-control-lg" placeholder="Password">
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">Log In</button>
                        </div>
                        <div class="text-center my-3">
                            <a href="#">Forgotten password?</a>
                        </div>
                        <hr>
                        <div class="text-center">
                            <button type="button" class="btn btn-success btn-lg" data-bs-toggle="modal" data-bs-target="#createAccountModal">
                                Create new account
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for Account Creation -->
    <div class="modal fade" id="createAccountModal" tabindex="-1" aria-labelledby="createAccountModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="createAccountModalLabel">Sign Up</h5>
                    <p class="modal-title fs-6">It's quick and easy.</p>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form>
                        <div class="row mb-3">
                            <div class="col">
                                <input type="text" class="form-control" placeholder="First name">
                            </div>
                            <div class="col">
                                <input type="text" class="form-control" placeholder="Last name">
                            </div>
                        </div>
                        <div class="mb-3">
                            <input type="email" class="form-control" placeholder="Mobile number or email address">
                        </div>
                        <div class="mb-3">
                            <input type="password" class="form-control" placeholder="New password">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Birthday</label>
                            <div class="row">
                                <div class="col">
                                    <select class="form-select">
                                        <option selected>Day</option>
                                        <!-- Options for days -->
                                    </select>
                                </div>
                                <div class="col">
                                    <select class="form-select">
                                        <option selected>Month</option>
                                        <!-- Options for months -->
                                    </select>
                                </div>
                                <div class="col">
                                    <select class="form-select">
                                        <option selected>Year</option>
                                        <!-- Options for years -->
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Gender</label>
                            <div class="d-flex justify-content-between">
                                <div class="form-check form-check-inline border rounded p-2 flex-grow-1 me-2">
                                    <label class="form-check-label">Female</label>
                                    <input class="form-check-input" type="radio" name="gender" value="female">
                                </div>
                                <div class="form-check form-check-inline border rounded p-2 flex-grow-1 me-2">
                                    <label class="form-check-label">Male</label>
                                    <input class="form-check-input" type="radio" name="gender" value="male">
                                </div>
                                <div class="form-check form-check-inline border rounded p-2 flex-grow-1">
                                    <label class="form-check-label">Custom</label>
                                    <input class="form-check-input" type="radio" name="gender" value="custom">
                                </div>
                            </div>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-success">Sign Up</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
